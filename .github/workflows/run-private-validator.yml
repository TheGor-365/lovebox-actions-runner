name: Run Private Lovebox Validator

on:
  workflow_dispatch:
    inputs:
      private_repo:
        description: Allowlisted private authority repository
        required: true
        type: choice
        options:
          - TheGor-365/lovebox
      private_branch:
        description: Allowlisted private branch
        required: true
        type: choice
        options:
          - main
          - prod/lovebox-prod-dev-001-oc-baseline
      private_sha:
        description: Exact lowercase 40-character private commit SHA
        required: true
        type: string
      private_pr:
        description: Allowlisted private pull request
        required: true
        type: string
        default: "52"
      gate_id:
        description: Allowlisted validation gate
        required: true
        type: choice
        options:
          - LOVEBOX_PUBLIC_RUNNER_SMOKE_V01
          - LOVEBOX_P1_OC_EXACT_HEAD_V01
      status_context:
        description: Allowlisted private status context
        required: true
        type: choice
        options:
          - public-runner/lovebox/smoke
          - public-runner/lovebox/p1-oc-exact-head
      write_status:
        description: Write compact status to the exact private commit
        required: true
        type: boolean
        default: false
      write_pr_comment:
        description: Write compact result to private PR 52
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: lovebox-public-runner-${{ inputs.private_sha }}-${{ inputs.gate_id }}
  cancel-in-progress: false

jobs:
  validate-private-sha:
    name: validate-private-sha
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lovebox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lovebox_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lovebox_test
      REDIS_URL: redis://localhost:6379/1
    outputs:
      result: ${{ steps.gate.outputs.result }}
      exit_code: ${{ steps.gate.outputs.exit_code }}
      summary_json: ${{ steps.gate.outputs.summary_json }}
      rspec_example_count: ${{ steps.gate.outputs.rspec_example_count }}
      rspec_failure_count: ${{ steps.gate.outputs.rspec_failure_count }}
      rubocop_offense_count: ${{ steps.gate.outputs.rubocop_offense_count }}
      brakeman_warning_count: ${{ steps.gate.outputs.brakeman_warning_count }}

    steps:
      - name: Checkout public runner
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Validate structured dispatch policy
        shell: bash
        env:
          PRIVATE_REPO: ${{ inputs.private_repo }}
          PRIVATE_BRANCH: ${{ inputs.private_branch }}
          PRIVATE_SHA: ${{ inputs.private_sha }}
          PRIVATE_PR: ${{ inputs.private_pr }}
          GATE_ID: ${{ inputs.gate_id }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
          WRITE_PR_COMMENT: ${{ inputs.write_pr_comment }}
        run: |
          set -euo pipefail
          [[ "$PRIVATE_REPO" == "TheGor-365/lovebox" ]]
          case "$PRIVATE_BRANCH" in
            main|prod/lovebox-prod-dev-001-oc-baseline) ;;
            *) exit 2 ;;
          esac
          [[ "$PRIVATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$PRIVATE_PR" == "52" ]]
          case "$GATE_ID:$STATUS_CONTEXT" in
            LOVEBOX_PUBLIC_RUNNER_SMOKE_V01:public-runner/lovebox/smoke) ;;
            LOVEBOX_P1_OC_EXACT_HEAD_V01:public-runner/lovebox/p1-oc-exact-head) ;;
            *) exit 2 ;;
          esac
          if [[ "$WRITE_PR_COMMENT" == "true" ]]; then
            [[ "$PRIVATE_BRANCH" == "prod/lovebox-prod-dev-001-oc-baseline" ]]
          fi
          printf '%s\n' "DISPATCH_POLICY=PASS"

      - name: Checkout allowlisted private branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ inputs.private_repo }}
          ref: ${{ inputs.private_branch }}
          token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          path: private-checkout
          fetch-depth: 1
          persist-credentials: false

      - name: Verify and detach exact private SHA
        shell: bash
        env:
          PRIVATE_REPO: ${{ inputs.private_repo }}
          EXPECTED_SHA: ${{ inputs.private_sha }}
        run: |
          set -euo pipefail
          actual_sha="$(git -C private-checkout rev-parse HEAD)"
          [[ "$actual_sha" == "$EXPECTED_SHA" ]]
          git -C private-checkout checkout --detach "$EXPECTED_SHA" >/dev/null 2>&1
          [[ "$(git -C private-checkout rev-parse HEAD)" == "$EXPECTED_SHA" ]]
          git -C private-checkout remote set-url origin "https://github.com/${PRIVATE_REPO}.git"
          git -C private-checkout config --local --unset-all http.https://github.com/.extraheader || true
          git -C private-checkout config --local --unset-all credential.helper || true
          if grep -Eqi '(x-access-token|authorization:)' private-checkout/.git/config; then
            exit 2
          fi
          printf '%s\n' "PRIVATE_BRANCH_SHA_MATCH=true" "DETACHED_PRIVATE_SHA=true" "CHECKOUT_CREDENTIAL_REMOVED=true"

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600
        with:
          ruby-version: .ruby-version
          bundler: Gemfile.lock
          bundler-cache: false
          working-directory: private-checkout

      - name: Set up Node
        uses: actions/setup-node@b789df37d6b7526a863bf51b65df64f3f56ffe4f
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Install locked dependencies
        shell: bash
        run: |
          set -uo pipefail
          run_quiet() {
            stage="$1"
            shift
            log="$RUNNER_TEMP/${stage}.log"
            "$@" >"$log" 2>&1
            rc=$?
            if [[ $rc -ne 0 ]]; then
              printf '%s\n' "SETUP_RESULT=ERROR" "FAILED_STAGE=${stage}" "EXIT_CODE=${rc}"
              exit "$rc"
            fi
            printf '%s\n' "${stage}=PASS"
          }
          export BUNDLE_PATH="$RUNNER_TEMP/bundle"
          run_quiet bundle_install bundle install --gemfile private-checkout/Gemfile --jobs 4 --retry 3
          run_quiet yarn_install bash -c 'cd private-checkout && corepack enable && corepack prepare yarn@1.22.22 --activate && yarn install --frozen-lockfile'

      - name: Prepare test database
        shell: bash
        run: |
          set -uo pipefail
          log="$RUNNER_TEMP/db_prepare.log"
          (cd private-checkout && RAILS_ENV=test bin/rails db:prepare) >"$log" 2>&1
          rc=$?
          if [[ $rc -ne 0 ]]; then
            printf '%s\n' "SETUP_RESULT=ERROR" "FAILED_STAGE=DB_PREPARE" "EXIT_CODE=${rc}"
            exit "$rc"
          fi
          printf '%s\n' "DB_PREPARE=PASS"

      - name: Run allowlisted gate
        id: gate
        shell: bash
        env:
          PRIVATE_REPO: ${{ inputs.private_repo }}
          PRIVATE_BRANCH: ${{ inputs.private_branch }}
          PRIVATE_SHA: ${{ inputs.private_sha }}
          PRIVATE_PR: ${{ inputs.private_pr }}
          GATE_ID: ${{ inputs.gate_id }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
        run: bash scripts/run_allowlisted_gate.sh private-checkout

      - name: Remove private checkout
        if: ${{ always() }}
        shell: bash
        run: rm -rf -- private-checkout

  writeback-result:
    name: writeback-result
    needs: validate-private-sha
    if: ${{ always() && (inputs.write_status || inputs.write_pr_comment) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout public runner
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Normalize compact result
        id: outcome
        shell: bash
        env:
          VALIDATION_JOB_RESULT: ${{ needs.validate-private-sha.result }}
          GATE_RESULT: ${{ needs.validate-private-sha.outputs.result }}
          GATE_EXIT_CODE: ${{ needs.validate-private-sha.outputs.exit_code }}
        run: |
          set -euo pipefail
          result="$GATE_RESULT"
          exit_code="$GATE_EXIT_CODE"
          if [[ -z "$result" ]]; then
            if [[ "$VALIDATION_JOB_RESULT" == "cancelled" ]]; then
              result="ERROR"
              exit_code="2"
            else
              result="ERROR"
              exit_code="2"
            fi
          fi
          case "$result" in PASS|FAIL|ERROR|BLOCKED) ;; *) exit 2 ;; esac
          [[ "$exit_code" =~ ^[0-9]+$ ]]
          printf 'result=%s\nexit_code=%s\n' "$result" "$exit_code" >> "$GITHUB_OUTPUT"

      - name: Write private commit status
        if: ${{ inputs.write_status }}
        shell: bash
        env:
          PRIVATE_REPO_API_TOKEN: ${{ secrets.PRIVATE_REPO_WRITE_TOKEN }}
          PRIVATE_REPO: ${{ inputs.private_repo }}
          PRIVATE_SHA: ${{ inputs.private_sha }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
          RESULT: ${{ steps.outcome.outputs.result }}
          EXIT_CODE: ${{ steps.outcome.outputs.exit_code }}
          PUBLIC_RUN_ID: ${{ github.run_id }}
          PUBLIC_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/write_private_commit_status.sh

      - name: Write compact private PR comment
        if: ${{ inputs.write_pr_comment }}
        shell: bash
        env:
          PRIVATE_REPO_API_TOKEN: ${{ secrets.PRIVATE_REPO_WRITE_TOKEN }}
          PRIVATE_REPO: ${{ inputs.private_repo }}
          PRIVATE_BRANCH: ${{ inputs.private_branch }}
          PRIVATE_SHA: ${{ inputs.private_sha }}
          PRIVATE_PR: ${{ inputs.private_pr }}
          GATE_ID: ${{ inputs.gate_id }}
          STATUS_CONTEXT: ${{ inputs.status_context }}
          RESULT: ${{ steps.outcome.outputs.result }}
          EXIT_CODE: ${{ steps.outcome.outputs.exit_code }}
          SUMMARY_JSON: ${{ needs.validate-private-sha.outputs.summary_json }}
          PUBLIC_RUN_ID: ${{ github.run_id }}
          PUBLIC_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/write_private_pr_comment.sh
